<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transparency - TON NFT Marketplace</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { 
            margin:0; padding:0; 
            background: linear-gradient(135deg, #f0f8ff, #e6f3ff); 
            color:#1a1a1a; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        header { 
            padding:15px; 
            background:#ffffff; 
            display:flex; 
            justify-content:space-between; 
            align-items:center; 
            position:sticky; 
            top:0; 
            z-index:10; 
            box-shadow: 0 2px 10px rgba(0,122,255,0.1);
            flex-wrap: wrap;
            gap: 10px;
        }
        h1 { margin:0; font-size:22px; color:#007aff; font-weight:700; }
        
        #balance-container { 
            display:flex; 
            align-items:center; 
            gap:8px; 
            background:#f0f8ff; 
            padding:8px 16px; 
            border-radius:20px; 
            font-weight:700; 
            font-size:18px; 
            color:#007aff;
            white-space: nowrap;
        }
        #balance { color:#007aff; }
        #plus-btn { 
            width:36px; height:36px; 
            background:#007aff; 
            color:white; 
            border:none; 
            border-radius:50%; 
            font-size:24px; 
            display:flex; 
            align-items:center; 
            justify-content:center;
            flex-shrink: 0;
        }
        
        #connect-btn { 
            background:#007aff; 
            color:white; 
            border:none; 
            padding:10px 20px; 
            border-radius:12px; 
            font-weight:600; 
            white-space: nowrap;
        }
        
        .nft-list { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:15px; padding:15px; }
        .nft-card { 
            background:#ffffff; 
            border-radius:16px; 
            overflow:hidden; 
            text-align:center; 
            box-shadow: 0 4px 15px rgba(0,122,255,0.15); 
        }
        .nft-card img { width:100%; height:160px; object-fit:cover; }
        .nft-card h3 { margin:10px 0 5px; font-size:16px; color:#1a1a1a; }
        .nft-card p { color:#007aff; font-weight:700; }
        button.buy { 
            background:#007aff; 
            color:white; 
            border:none; 
            padding:10px; 
            width:100%; 
            font-weight:600; 
        }
        
        .modal { 
            display:none; 
            position:fixed; 
            top:0; left:0; 
            width:100%; height:100%; 
            background:rgba(0,0,0,0.6); 
            z-index:100; 
            justify-content:center; 
            align-items:center; 
        }
        .modal-content { 
            background:#fff; 
            padding:25px; 
            border-radius:20px; 
            width:90%; 
            max-width:320px; 
            text-align:center; 
        }
        input { width:100%; padding:12px; font-size:18px; border:2px solid #007aff; border-radius:12px; margin:15px 0; }
    </style>
</head>
<body>
    <header>
        <h1>Transparency</h1>
        
        <div id="balance-container">
            <span id="balance">0.00</span> TON
            <button id="plus-btn" onclick="showDepositModal()">+</button>
        </div>
        
        <button id="connect-btn">Подключить кошелёк</button>
    </header>

    <div class="filters" style="padding:10px; background:#fff; display:flex; gap:10px; flex-wrap:wrap;">
        <button onclick="filterPrice(0)" style="background:#007aff;color:white;border:none;padding:8px 16px;border-radius:12px;">Все</button>
        <button onclick="sortLatest()" style="background:#007aff;color:white;border:none;padding:8px 16px;border-radius:12px;">Сначала новые</button>
    </div>

    <div id="nft-list" class="nft-list">
        <div style="text-align:center;padding:20px;color:#666;">Загружаем реальные NFT...</div>
    </div>

    <!-- Модальное окно депозита -->
    <div id="deposit-modal" class="modal">
        <div class="modal-content">
            <h3 style="color:#007aff;">Добавить TON на баланс бота</h3>
            <input id="deposit-amount" type="number" step="0.01" placeholder="Сумма TON" value="10">
            <br>
            <button onclick="confirmDeposit()" style="background:#007aff;color:white;border:none;padding:12px 30px;border-radius:12px;margin:10px;">Отправить TON</button>
            <button onclick="closeDepositModal()" style="background:#ccc;color:#333;border:none;padding:12px 30px;border-radius:12px;">Отмена</button>
        </div>
    </div>

    <!-- Новое модальное окно кошелька (с кнопкой отключения) -->
    <div id="wallet-modal" class="modal">
        <div class="modal-content">
            <h3 style="color:#007aff;">Ваш кошелёк</h3>
            <p style="font-family: monospace; font-size:16px; color:#333; word-break:break-all;" id="wallet-address">UQ...</p>
            <button onclick="disconnectWallet()" style="background:#ff3b30;color:white;border:none;padding:12px 30px;border-radius:12px;margin:10px;width:100%;">Отключить кошелёк</button>
            <button onclick="closeWalletModal()" style="background:#ccc;color:#333;border:none;padding:12px 30px;border-radius:12px;width:100%;">Закрыть</button>
        </div>
    </div>

    <script>
        const API_KEY = 'AG2SZBO6JHBPRGQAAAAO7WCWWAFLE7RM5YCSTJTQQSCC3GHDSPNVEKAL6NIHQVACOOZMHII';
        const MARKET_WALLET = 'UQDLUQwxUttwdqd4VBOpqAAHwzPH_O7QTCVhCceKuDyh-DKI';

        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready(); tg.setHeaderColor("#f0f8ff");

        let tonConnectUI;
        let isConnected = false;
        let userAddress = null;
        let depositBalance = 0;
        let allNFTs = [];

        async function initTonConnect() {
            tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl: 'https://raw.githubusercontent.com/maivonai/transparencyMRKT/main/tonconnect-manifest.json'
            });

            tonConnectUI.onStatusChange((wallet) => {
                if (wallet) {
                    isConnected = true;
                    userAddress = wallet.account.address;
                    document.getElementById('connect-btn').textContent = 'Кошелёк подключён ✓';
                } else {
                    isConnected = false;
                    userAddress = null;
                    document.getElementById('connect-btn').textContent = 'Подключить кошелёк';
                }
            });
        }

        // Обработка нажатия на кнопку подключения
        async function handleConnectClick() {
            if (isConnected) {
                showWalletModal();
            } else {
                try {
                    await tonConnectUI.openModal();
                } catch (e) {
                    console.error('Ошибка открытия модалки подключения:', e);
                }
            }
        }

        // Модалка кошелька
        function showWalletModal() {
            const addrEl = document.getElementById('wallet-address');
            const shortAddr = userAddress ? userAddress.slice(0, 6) + '...' + userAddress.slice(-4) : '—';
            addrEl.textContent = shortAddr;
            document.getElementById('wallet-modal').style.display = 'flex';
        }
        function closeWalletModal() {
            document.getElementById('wallet-modal').style.display = 'none';
        }
        async function disconnectWallet() {
            try {
                await tonConnectUI.disconnect();
                closeWalletModal();
            } catch (e) {
                alert('Ошибка отключения: ' + e.message);
            }
        }

        // Депозит
        function showDepositModal() {
            document.getElementById('deposit-modal').style.display = 'flex';
        }
        function closeDepositModal() {
            document.getElementById('deposit-modal').style.display = 'none';
        }
        async function confirmDeposit() {
            if (!isConnected) {
                closeDepositModal();
                alert('Сначала нажми "Подключить кошелёк" сверху!');
                return;
            }
            const amount = parseFloat(document.getElementById('deposit-amount').value);
            if (!amount || amount <= 0) return alert('Введи правильную сумму');

            closeDepositModal();

            try {
                await tonConnectUI.sendTransaction({
                    validUntil: Math.floor(Date.now() / 1000) + 300,
                    messages: [{
                        address: MARKET_WALLET,
                        amount: (amount * 1_000_000_000).toString(),
                        payload: btoa(`deposit Transparency`)
                    }]
                });

                depositBalance += amount;
                document.getElementById('balance').textContent = depositBalance.toFixed(2);
                alert(`✅ ${amount} TON отправлено на баланс бота!`);
            } catch (e) {
                alert('Ошибка отправки: ' + (e.message || e));
            }
        }

        // Остальной код (NFT, покупка и т.д.)
        async function loadNFTs() {
            try {
                const res = await fetch(`https://tonapi.io/v2/nfts/items?limit=50`, {
                    headers: { 'Authorization': `Bearer ${API_KEY}` }
                });
                const data = await res.json();
                allNFTs = data.nft_items || [];
                renderNFTs(allNFTs);
            } catch (e) {
                document.getElementById('nft-list').innerHTML = '<div style="text-align:center;padding:20px;color:#666;">Ошибка загрузки NFT</div>';
            }
        }

        function renderNFTs(nfts) {
            const container = document.getElementById('nft-list');
            container.innerHTML = '';
            nfts.forEach(nft => {
                const meta = nft.metadata || {};
                const card = document.createElement('div');
                card.className = 'nft-card';
                card.innerHTML = `
                    <img src="${meta.image || 'https://via.placeholder.com/300?text=NFT'}" alt="${meta.name}">
                    <h3>${meta.name || 'NFT'} #${nft.index || ''}</h3>
                    <p>10 TON</p>
                    <button class="buy" onclick="buyNFT('${nft.address}')">Купить</button>
                `;
                container.appendChild(card);
            });
        }

        async function buyNFT(nftAddr) {
            if (!isConnected) return alert('Сначала подключи кошелёк!');
            try {
                await tonConnectUI.sendTransaction({
                    validUntil: Math.floor(Date.now() / 1000) + 300,
                    messages: [{ address: MARKET_WALLET, amount: "10000000000", payload: btoa(`buy NFT`) }]
                });
                alert('✅ NFT куплен (10 TON отправлено)');
            } catch (e) { alert('Ошибка: ' + (e.message || e)); }
        }

        function filterPrice() { renderNFTs(allNFTs); }
        function sortLatest() { renderNFTs(allNFTs); }

        // Запуск
        window.onload = () => {
            initTonConnect();
            loadNFTs();
            document.getElementById('connect-btn').onclick = handleConnectClick;
        };
    </script>
</body>
</html>
